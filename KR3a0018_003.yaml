body:
  text: 伸䝉子卷下唐林慎思撰時喻二篇上篇凡八章明性韶夏之聲人非不知可敬而不能嗜也鄭衛之聲人非不知可去而不能捨也何哉可敬者禮節也禮則難行故人不能嗜矣可去者非禮也非禮易惑故人不能捨矣是以演先王之教不得人之樂者教難行也吐倡優之辭皆得人之喜者辭易惑也惡有聖徒能乗其心者後易惑而難行哉刺奢一樹之花人爭盼焉一株之棘人争忌焉且人皆愛花之鮮妍不知鮮妍能誘人為驕奢之患矣人皆忌棘之傷害不知傷害能誡人行正直之路矣嗚呼驕奢事極則花為禍人之根者也正直路存則棘為利人之本者也而人不知忌于花而忌于棘噫其惑人也久矣顯防居暗室而望明庭者雖隔簾幙而妍醜亦辨矣居明庭而視暗室者雖去簾幙而美惡不分矣故君子居其顯進退不違規矩也脱有一失則庸昧者皆見而譟矣小人處其昧動作皆為非僻也曽無一是雖尊顯者誰見而誅是以古之聖賢立道光顯為後代所瞻矚使無一失者得不由防其譟之邪伺難舟行防覆溺之患伺無風波則越重溟如池沼矣車行防鹵掠之患伺無冦盜則踰脩嶺如康荘矣君子行其道則先防惡人伺其善則交之豈知有行善而蓄惡者難伺甚于風波冦盜乎及中路罹其謗譖則何啻于舟車之遇溺掠邪治難習幻惑之徒蓄其異術每一呼吸皆能變寒為暑變正為非矣習焚鍊之徒蓄其神方每一施用皆能變石為金變土為銀矣然外物榮枯貴賤猶能變之而已身榮枯貴賤不能變之何邪信知治外物之易而治己身之難也今有人行文行忠信之道能言于人而不能行于己與夫習幻惑焚鍊之徒何如是知巧婦之手不能飾醜為容壯夫之力不能拔賤為貴審類負樵蘓者日跨崇巔不吿吾勞矣乗麒驥者一渉脩途則吾倦矣非負樵者不勞而不告吿之無聽于人焉乗馬者一倦而吁則吁有聞于人焉是以處上位者不見下民之艱一有不快其心者則吁聞于天下矣噫豈知下民終日勞心而無吿于上乎遠化日月之照孰曰偏邪而瞽者不被日月矣雷霆之震孰曰隐邪而聵者不戴雷霆矣聖人以恩信臨人豈得昧于天下乎盖習叛者瞽于恩信也刑法示人豈得黙于天下乎盖習盜者聵于刑法也嗚呼恩信非不博刑法非不大而叛民盜吏瞽聵于下豈恩信刑法能化乎譏惑絲蟲常絲也絆人之身孰曰喜邪梟鳥常舌也鳴人之面孰曰怪邪以其為喜未聞歸福于亂以其為怪未聞降禍于徳是豈蟲鳥之動有徴邪盖為小人觀聽不能無惑耳則知妖容露于人人皆愛也豈知絆人之心為疾乎嗔語示于人人皆惡也豈知鳴人之過為誡乎下篇凡八章由天趙女有巧飾容者越女見之謂傾國之態難移矣豈知習之而反自勝邪郢人有善調歌者巴人聞之謂貫珠之音可奪矣豈知習之而反不及邪且顔容喉舌天然也妍醜清濁豈有同乎盖以齊莊運動不得無師矣仲尼昔師于老氏也後設其教則大于老氏焉是師其齊莊也妍醜豈由于老氏乎韓非李斯昔師于荀卿也後行其道則反於荀卿焉是師其運動也清濁豈由於荀卿乎若使人有能否可褒責其師也則妍醜清濁亦可移于人不由天矣警惑投數爭輸贏一有勝之者則呵而怒矣卜聲伺凶吉一有不善者則慄而懼矣投之卜之皆我為也而數與聲豈有情于我乎夫區區于名利之途者朝出暮入投一章卜一句宜為人所知矣及其不知也則或憤或戚焉噫殊不知自為之也豈知知道之人而無憤無戚邪辨功傭治粟者雖役力求精曾不得其嘗焉傭治膳者雖不勞力自精亦先得其嘗焉矧治粟功至僅免于誅也治膳功至又加其賞焉何則治粟猶四方外臣也治膳猶左右内臣也外不及内而然也噫使眀目達聰鑒難易于内外而賞罰豈有謬加者乎慎名終身為善而善未必聞卒有一惡歸之則為善之名敗矣終身為惡而惡不可揜卒有一善歸之則為惡之名弭矣鯀之職非不專也一旦功不至反戾其職矣管仲之謀非不僭也一旦功既霸反髙其謀也嗚呼服玩之器重于千金也忽壊則棄糞壤焉稗草之叢蔓于茸蘭也忽食則同糓粟焉指常啗官之膳以膳為常雖疊嵗飯之而心無荷焉啗人之饌以饌為異雖一旦飯之而心長感焉人在治代則以聚樂為常也疊嵗受唐虞之化孰有荷乎人在亂代則以聚樂為異也一旦被湯武之徳孰無感乎嗟夫徒知感異恩於一旦豈知荷常徳于疊歲邪指公郡起虎狼之暴雖隔他郡聞之亦咸有懼心也地産珠玉之珍雖隔異地聞之亦咸有嗜心也一有能殺狼虎者衆聞之莫不喜一有能得珠玉者衆聞之莫不嫉盖殺者去衆害公其利也得者奪衆好私其利也且人心皆知喜公而嫉私也使能得是公去是私而與衆人喜而不嫉者㡬人乎諷失設穽于路用去害焉害未及去而人過之反為害矣稅金于市用化利焉利未及化而人叛之反失利矣且養其卒非捕民之冦盜邪冦盜未必由卒捕也而先盡民之父子焉條其吏非勸民之農桑邪農桑未必由吏勸也而先奪民之粟帛焉斯不亦用去害而為害化利而失利歟嗚呼韓非説難嵇康養生亦㡬于是矣書誤鑿井於路傍用濟路人之渇一有堕之者則罪鑿井焉立署于河側用𣙜商賈之利一有危之者則反徳立署焉然鑿井至仁而反不仁立署至不仁而反仁邪所反者皆誤而然也是以力仁之人苟防其誤則不得其仁矣力不仁之人不防其誤則不全其不仁矣嗚呼吾見今為不仁但多防誤者矣孰見今為仁有不防誤者邪伸䝉子卷下
