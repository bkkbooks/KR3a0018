body:
  text: 伸䝉子儒家類提要臣等謹案伸䝉子三卷唐林慎思撰前有慎思自序曰舊著儒範七篇辭艱理僻不為時人所知復研精殫思一旦齋沐禱心靈是宵夢有異焉明日召蓍祝之得䝉之觀曰伸䝉入覯通明之象也因自號伸䝉子又曰嘗與二三子辨論興亾敷陳古今編成上中下三卷槐里辨三卷象三才叙天地人之事澤國紀三篇象三才叙君臣人之事案唐人避太宗諱故以君臣民為君臣人時喻二篇象二教叙文武之事今觀其書上卷設為干禄先生知道先生求己先生問答中卷設為𢎞文先生如愚子盧乳子問答下卷則自抒己説惟上卷喻時一篇釋仲尼小天下之義詞不近理其餘皆持論醇正非唐時天隠無能諸子所可彷彿崇文總目列之儒家葢為不忝惟其所列六人之名書干禄為􅺵􅼯書知道為􆁂􆁀書求己為􅼧􅱧書𢎞文為􆆭􆁅書如愚為􆀵􆀴書盧乳為􅫈􆁆而各註所以增改偏旁之故皆怪而近妄是則好竒之過矣乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀伸䝉子原序予沽名未售退棲槐里舊著儒範七篇辭艱理僻不為時人所知復研精覃思一旦齋沐禱心靈是宵夢有異焉明日召蓍祝之得䝉之觀曰伸䝉入觀通明之象也因感而有所述焉自號伸䝉子嘗與二三子辯論興亡敷陳古今也或引事以眀理或摛才以潤詞録近萬言編成上中下三卷上卷槐里辯三篇象三才叙天地人之事中卷澤國紀三篇象三辰叙君臣人之事下卷時喻二篇象二教叙文武之事焉予所學周公仲尼之道所言堯舜禹湯文武之行事也如有用我者吾言其施吾學其行乎揚雄謂後世有揚子雲當知吾太𤣥安知後世不有林䖍中者出吾言迂乎哉大唐咸通六年二月四日長樂林慎思䖍中自序
