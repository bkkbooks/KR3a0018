body:
  text: 伸蒙子卷上唐林慎思撰槐里辨三篇上篇凡五章彰變賞罰喻妖祥興衰喻良暴干祿先生本作􅺵􅼯問王道興衰由天之厯數有諸伸蒙子曰非天也人也曰星有妖祥天所示也不使妖見唐虞祥呈幽厲豈非天職興衰不亂亦妖祥均耶曰里有良吏暴吏損益于民也不由牧政之心焉然則政之不亂也不使罰及忠信賞歸苛酷矣是賞罰均于政也而良暴豈由于政哉是興衰係乎君人猶良暴係乎里吏則天示妖祥顧非均于賞罰邪豈使妖見唐虞祥呈幽厲歟則知化妖祥者由乎天變興衰者由乎人故曰非天也人也辨治治大易治小難干祿先生曰治千乘之國與十室之邑孰難伸蒙子曰國易曰何以然哉曰治大以智治小以力智役衆人力窮一身然則勞衆孰與勞己之難乎夫工于材也有繩墨焉有斧斤焉繩墨以智也斧斤以力也布繩墨豈不易于運斧斤之勞乎矧繩墨誤猶可移斤斧誤其可移哉治國施教令非布繩墨邪治邑承教令非運斤斧邪則治國孰與于治邑之勞乎喻民古今化民難易干祿先生曰古民難化于今民乎伸蒙子曰今人易化曰古民性朴今民性詐安得詐易于朴邪曰朴止也詐流也止猶土也流猶水也水可決使東西乎土可決使東西乎且嬰兒未有知也性無朴乎丱兒已有知也性無詐乎聖人養天下之民猶養兒也則古民嬰然未有知也今民丱然已有知也化已有知孰與化未有知之難乎演喻干祿先生曰子謂今民易化何唐堯獨彰于古邪伸蒙子曰吾所謂古民難化性猶土也土不移移則墝埆生矣今民易化性猶水也水可導導則其源清矣是以古之民雖唐堯在上終不能化頑嚚使有知今之民有堯之化孰有頑嚚之難化乎故曰今民易化也較功干祿先生曰吾聞昔者嬴噬六國劉剪一項較其功孰難伸蒙子曰嬴難曰六國誤于儀秦之辨嬴因其敝而取之奚其難曰吾聞秦原有鹿獵師不能獲焉一旦猛虎殺而棄之然後獵師爭而取之矣且殺之者生鹿也爭之者死鹿也嬴噬六國是虎殺生鹿劉剪一項是獵師爭死鹿也與其得死鹿于劉孰若得生鹿于嬴之難乎然嬴不二世而劉四百年得生鹿之虎又孰如得死鹿之獵師乎中篇凡四章演聖知道先生本作􆁂􆁀問仲尼不得封楚不患無土乎伸蒙子曰仲尼得于楚不為有土失于楚不為無土何則鰌居之水鯤不可止也鶯巢之林鵬不可棲也故仲尼無土于一時有土于萬代也且生遇無道則天下猶小不容仲尼也矧一楚國何益乎苟生遇有道則陋巷非隘可封仲尼也雖百楚國何及乎所以仲尼之道髙大無窮焉亘萬代而乃容非一時之能容矣苟以一時封楚是鯤止鰌水鵬棲鶯林既莫能容也孰為有土乎所以亘萬代而乃容果遇有道而封也孰為無土乎故儒行曰儒有不祈土地立禮義以為土地則知仲尼不得封楚不患無土明矣喻時知道先生曰仲尼登泰山小天下其然乎伸蒙子曰然曰天覆無窮惡謂小邪曰以時觀之而小也夫越巨川遇昏暝之時望十里之岸如在數步之中是豈川之隘乎蓋昏暝觀之而然也仲尼生于周末厯聘七十國莫能容者非天下昏暝乎天下昏暝觀之而小不亦宜哉若使仲尼生于陶唐之代則君如日也天下皆晝也天下惡得而小哉故曰以時觀之而小矣全明知道先生曰吾聞仲尼日月也伐木于宋削迹于衛有損于明乎伸蒙子曰何損哉夫盜者習于昏黑也見明則惡之蓋不利其盜矣宋衛是習昏黑者也見仲尼則惡之蓋不利宋衛之盜矣盜自盜也日月仲尼何損哉曰厯聘無用于天下有損于明乎曰何損哉夫人之寐也見明則避之所以不用日月也是時天下諸侯皆寐見仲尼則避之所以不用仲尼矣寐自寐也日月仲尼何損之有遷善知道先生曰吾聞伊尹放太甲于桐宫有諸伸蒙子曰于書有之曰臣放君忠乎曰太甲始立不肖伊尹放之可也曰桀紂不肖龍逢比干惡不放歟曰桀紂大不肖也安能放哉曰吾聞狸能捕鼠不能捕狗則伊尹其捕鼠邪伸蒙子莞爾而笑曰先生聞良馬有害人者乎良御必能維縶以馴伏其性也聞猛虎有噉人者乎武士安能囚拘以馴伏其性邪太甲不肖猶良馬也伊尹則可維縶以遷于善也桀紂不肖猶猛虎也龍逢比干豈可囚拘以遷于善乎知道先生釋然曰誠哉吾子可謂知言矣下篇凡五章明化隨其才性而化求已先生本作􅼧􅱧問人之善惡能化而遷乎伸蒙子曰遷矣曰性有剛柔天然也猶火可遷于水邪曰善不在柔惡不在剛也火能炮燔亦能為災水能潤澤亦能為沴及其遷也化災為炮燔化沴為潤澤豈在化火為水乎人之善惡隨化而遷也必能反善為惡反惡為善矣孟母正己以化于孟軻及其遷也非反惡為善邪齊桓大功而化于竪刁及其遷也非反善為惡邪所謂人之善惡隨化而遷不亦明乎廣賢求已先生曰周公吐哺以急賢然未聞賢肖周公何為急邪伸蒙子曰周公以急賢之心要四方之心不在肖周公而急之也若必肖周公而方急之則無賢可急何以要四方之心乎夫賈者積金市物聞鬻者之聲則必躍然而近之雖物不合賈者亦償金而取焉所以不阻四方之物也不阻四方之物則四方之心嚮焉周公設禮以待士聞有士之名則必欣然而迎之雖士不及周公亦下禮而接焉所以不阻四方之士也不阻四方之士則四方之心歸焉則知急賢之心要四方之心也豈有肖周公而後急之邪較仁求已先生曰善治天下與善治國者其語大則曰堯仁如天周德至矣然稽其勤治之心昌及于勛邪伸蒙子曰論其位則勛崇較其仁則昌至先生囅然曰昌民得及勛民之樂邪曰勛民雖樂不及昌民喜也曰噫昌之時辛方縱毒天下之民皆罹其苦遇昌德化猶酷父之子其伯叔私撫焉當是時幸其偷生亦憂且懼矣寧謂喜邪勛之時水不為沴天下之民皆忘其咨又遇勛仁化猶沃壤之苗而甘澤復加焉當是時生意滋茂泰且樂矣寧無喜邪曰先生聞齊相養士三千乎聞晉臣飯桑下餓人乎餓困而得食與食厭而得魚孰急乎五帝之民以時治為常遇勛之仁豈非食厭而得魚歟商末之民以時亂為常遇昌之德豈非餓困而得食歟故謂勛民雖樂不及昌民喜也亦明矣持危求已先生曰四皓遁迹避時名髙後代酌其傲君而處私賂而出非罪人邪伸蒙子曰正天下也何罪之有曰徇吕氏以矯髙祖是躡邪徑而背直道何反謂正哉曰用邪扶正也且大厦之欹也必欹其木以扶之然後正矣方髙祖欲廢嫡立庶太子勢搖羣臣心動是時天下政柄將失所持四皓心是危急可以正之惡能忍其危哉所以徇吕后謀從孝惠出是謂用邪扶正不甚至歟苟為不然則從其廢嫡立庶戚氏得以惑亂一人侮蔑萬樞欲漢室不危難矣又安得傳其後嗣哉則知四皓始而處者非傲君也辭天爵也終而出者非私賄也正天下也利用求已先生曰治民之用恩刑恩刑之利孰最伸蒙子曰刑最曰刑施而民怨其利邪恩施而民悅其不利邪曰恩施于民民既民矣刑施于民民不民矣且民既民恩不加民自化也民不民刑不加民誰禦哉譬處家而治羣下焉下之良者雖恩賞不至且未失于良矣下之惡者苟刑責不及孰可制其惡哉是知治民用刑為最􅺵􅼯本注槐里有干祿先生始隱髙山獨懷古節不徇時態嘗語人曰吾逢有道則出無道則隱今遇昭代吾不能違遂出以干祿為字然而棲遲法度進退容儀未嘗忘山故字從山􆁂􆁀本注槐里有知道先生自謂進退有時吾不妄動是以自謂知道蓋有樂水之癖凡居處視聽以泉源池沼為樂故字從水表德也􅼧􅱧本注槐里有求已先生陋巷固窮學道無倦嘗曰莫邪器成不磨礪其刃安能剸犀截鐡君子晦迹不磨礪其道安能顯揚故號求已先生字從石伸蒙子卷上
